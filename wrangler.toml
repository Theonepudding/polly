name = "polly"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Update pattern + zone_name to match your domain before deploying
routes = [
  { pattern = "polly.pudding.vip", custom_domain = true, zone_name = "pudding.vip" }
]

[vars]
NEXTAUTH_URL = "https://polly.pudding.vip"

[observability]
enabled = true

[observability.logs]
enabled = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Create a new KV namespace in Cloudflare dashboard and paste the ID below
[[kv_namespaces]]
binding = "POLLY_KV"
id = "342a355a3dac4535afd7c20f1452b3a9"

# Run: npx wrangler d1 create polly-votes  — then paste the database_id below
[[d1_databases]]
binding     = "POLLY_D1"
database_name = "polly-votes"
database_id = "2ddb5a1a-5e87-463d-934a-5119b34bbbae"

# Cron: runs every 5 minutes — closes expired polls, sends 24h reminders, fires templates
[triggers]
crons = ["*/5 * * * *"]
